<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pergunta</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

#legenda h1{
    font-size:40px;
}

.botoes{
    margin-top:20px;
}

button{
    padding:12px 30px;
    font-size:18px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#sim{
    background:#4CAF50;
    color:white;
}

#nao{
    background:#ff4d4d;
    color:white;
}
</style>
</head>

<body>

<div id="legenda">
<h1>Preparada para a pergunta mais importante?!</h1>

<div class="botoes">
<button id="sim">Sim</button>
<button id="nao">Não</button>
</div>
</div>

<script>
document.getElementById("sim").onclick = function(){
    alert("Eu sabia!! ❤️");
}

document.getElementById("nao").onclick = function(){
    alert("Resposta errada 😅 tenta de novo!");
}
</script>

</body>
</html>
