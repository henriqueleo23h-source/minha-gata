
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz Completo</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    text-align:center;
    padding:40px;
}

#wrapper{
    background:white;
    max-width:500px;
    margin:auto;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

ul{
    padding:0;
}

.alternativa{
    list-style:none;
    background:#eee;
    margin:10px 0;
    padding:12px;
    border-radius:6px;
    cursor:pointer;
}

.alternativa:hover{
    background:#ddd;
}

#pontos{
    margin-top:20px;
    font-weight:bold;
}
</style>

</head>

<body>

<!-- Música em segundo plano -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/ox7RsX1Ee34?autoplay=1&loop=1&playlist=ox7RsX1Ee34"
frameborder="0"
allow="autoplay">
</iframe>

<h1>Quiz</h1>
<p>Clique na resposta correta</p>

<div id="wrapper">

<h2 id="pergunta"></h2>

<ul>
<li class="alternativa"></li>
<li class="alternativa"></li>
<li class="alternativa"></li>
<li class="alternativa"></li>
</ul>

<div id="pontos"></div>

</div>

<script>

let perguntas = [

{
pergunta: "Qual melhor filme que você já viu?",
alternativas: [
"Hereditário",
"A Entidade",
"Todo Mundo em Pânico",
"Mal Que Nos Habita"
],
correta: 3
},

{
pergunta: "Qual meu time?",
alternativas: [
"Galo",
"Cruzeiro",
"Vasco",
"Palmeiras"
],
correta: 0
},

{
pergunta: "O que você é?",
alternativas: [
"Incrível",
"Muito incrível",
"Super incrível",
"Extremamente incrível"
],
correta: 0
},

{
pergunta: "Seu nível de beleza?",
alternativas: [
"1%",
"100%",
"110000%",
"1000000000000000000000000000000000000000000000000%"
],
correta: 3
},

{
pergunta: "Pessoa mais incrível do mundo?",
alternativas: [
"Você",
"Lula",
"Bolsonaro",
"Nikole Ferreira"
],
correta: 0
}

]

let atual = 0
let pontos = 0

let pergunta = document.getElementById("pergunta")
let alternativas = document.querySelectorAll(".alternativa")
let pontosTxt = document.getElementById("pontos")

function carregarPergunta(){

let q = perguntas[atual]

pergunta.innerHTML = q.pergunta

for(let i=0;i<alternativas.length;i++){

alternativas[i].innerHTML = q.alternativas[i]

alternativas[i].onclick = function(){

if(i === q.correta){
pontos++
}

atual++

if(atual < perguntas.length){
carregarPergunta()
}else{
pergunta.innerHTML = "Quiz finalizado!"
document.querySelector("ul").style.display="none"
pontosTxt.innerHTML = "Pontuação: " + pontos + "/" + perguntas.length
}

}

}

}

carregarPergunta()

</script>

</body>
</html>
